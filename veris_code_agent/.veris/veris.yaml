gauntlet-code-analyzer-env:
  services: []   # No external services -- pure code analysis

  actor:
    channels:
      - type: http
        url: http://localhost:8008/chat
        method: POST
        headers:
          Content-Type: application/json
        request:
          message_field: message
          session_field: session_id
        response:
          type: json
          message_field: response
          session_field: session_id

  agent:
    name: gauntlet-code-analyzer
    code_path: /agent
    entry_point: uvicorn app.main:app --host 0.0.0.0 --port 8008
    port: 8008
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BASETEN_API_KEY: ${BASETEN_API_KEY}

